<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वाक्यAI - Sanskrit Transcription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f8f6f2; /* Soft Cream */
            --card-white: #ffffff;
            --accent-coral: #e76f51; /* Warm Coral */
            --accent-rose: #b5838d; /* Muted Rose */
            --text-dark: #2b2b2b; /* Dark Grey */
            --text-muted: #6b7280;
            --border-soft: #e5e7eb;
            --shadow-soft: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.03em;
            color: var(--text-dark);
        }

        .brand-logo span {
            color: var(--accent-coral);
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        .card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .upload-section {
            margin-bottom: 24px;
        }

        .drop-zone {
            width: 100%;
            height: 180px;
            border: 2px dashed #dedbd3;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fdfcfb;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover, .drop-zone.drag-active {
            border-color: var(--accent-coral);
            background-color: #fff9f6;
        }

        .drop-zone-icon {
            width: 48px;
            height: 48px;
            background: rgba(231, 111, 81, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            transition: transform 0.3s ease;
        }

        .drop-zone:hover .drop-zone-icon {
            transform: scale(1.1);
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            stroke: var(--accent-coral);
        }

        .drop-zone-text {
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .drop-zone-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .file-input {
            display: none;
        }

        .file-info {
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--accent-rose);
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .label-text {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .select-field {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            border: 1.5px solid var(--border-soft);
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            background-color: white;
            color: var(--text-dark);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%20fill%3D%22none%22%20stroke%3D%22%236b7280%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 18px;
        }

        .select-field:focus {
            border-color: var(--accent-coral);
        }

        .btn-transcribe {
            width: 100%;
            height: 56px;
            background-color: var(--accent-coral);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(231, 111, 81, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-transcribe:hover:not(:disabled) {
            background-color: #d85c3e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 111, 81, 0.35);
        }

        .btn-transcribe:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-transcribe:disabled {
            background-color: #e5e5e5;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 32px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: #fffcf9;
            border: 1px solid #f2ede4;
            border-radius: 18px;
            padding: 24px;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .result-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-rose);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .badge {
            background: rgba(181, 131, 141, 0.1);
            color: var(--accent-rose);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .transcription-output {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text-dark);
            white-space: pre-wrap;
            font-weight: 400;
        }

        .error-message {
            color: #cc4444;
            font-size: 0.95rem;
            text-align: center;
            background: #fff5f5;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1 class="brand-logo">वाक्य<span>AI</span></h1>
            <p class="tagline">Sanskrit Speech-to-Text Reinvented</p>
        </div>

        <div class="card">
            <form id="asr-form">
                <div class="upload-section">
                    <label class="label-text">1. Choose Audio</label>
                    <div class="drop-zone" id="drop-zone">
                        <div class="drop-zone-icon">
                            <svg class="icon-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </div>
                        <p class="drop-zone-text">Drop audio file here</p>
                        <p class="drop-zone-subtext">Supports WAV, MP3, M4A, FLAC</p>
                        <input type="file" id="file-input" class="file-input" accept="audio/*">
                    </div>
                    <div class="file-info" id="file-info">Selected: <span id="file-name"></span></div>
                </div>

                <div class="input-group">
                    <label class="label-text">2. Select Model</label>
                    <select id="model-select" class="select-field">
                        <option value="whisper">वाक्य Whisper (Precision)</option>
                        <option value="hubert">वाक्य HuBERT (Phonetic)</option>
                    </select>
                </div>

                <button type="submit" class="btn-transcribe" id="submit-btn" disabled>
                    <span id="btn-text">Transcribe Now</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div class="error-message" id="error-msg"></div>

            <div class="result-section" id="result-section">
                <div class="result-card">
                    <div class="result-header">
                        <span class="result-label">Output</span>
                        <span class="badge" id="model-badge">Whisper</span>
                    </div>
                    <div class="transcription-output" id="output-text">
                        येन केन प्रकारेण यस्य कस्यपि देहिनः ।
                        सन्तोषं जनयेत्प्राज्ञस्तदेवेश्वरपूजनम् ॥
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('asr-form');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const resultSection = document.getElementById('result-section');
        const outputText = document.getElementById('output-text');
        const modelBadge = document.getElementById('model-badge');
        const errorMsg = document.getElementById('error-msg');
        const modelSelect = document.getElementById('model-select');

        let selectedFile = null;

        // Interaction Handlers
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files[0]) handleFileSelection(e.target.files[0]);
        };

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-active');
        };

        dropZone.ondragleave = () => dropZone.classList.remove('drag-active');

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files[0]) handleFileSelection(e.dataTransfer.files[0]);
        };

        function handleFileSelection(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileInfo.style.display = 'block';
            submitBtn.disabled = false;
            errorMsg.style.display = 'none';
        }

        // Final Submission Workflow
        form.onsubmit = async (e) => {
            e.preventDefault();
            if(!selectedFile) return;

            // UI Feedback
            submitBtn.disabled = true;
            btnText.textContent = 'Processing...';
            loader.style.display = 'block';
            resultSection.style.display = 'none';
            errorMsg.style.display = 'none';

            const formData = new FormData();
            formData.append('audio', selectedFile);
            formData.append('model', modelSelect.value);

            try {
                const response = await fetch('/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if(data.status === 'success') {
                    outputText.textContent = data.transcription || "[No transcription returned]";
                    modelBadge.textContent = data.model.toUpperCase();
                    resultSection.style.display = 'block';
                } else {
                    throw new Error(data.message || data.error || 'Server error occurred');
                }
            } catch (err) {
                errorMsg.textContent = 'Connection Error: ' + err.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Transcribe Now';
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>
